      summary: 주소 또는 buildingId 로 본부장·관리소장 정보를 조회 (온보딩 위저드용)
      description: |
        시설담당·경리 가입 위저드 step2 에서 사용. 입력한 주소(jibun) 또는
        buildingId 로 매칭되는 건물의 본부장(role=hq_executive)과
