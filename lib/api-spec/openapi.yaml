            ({{addressFull}}) 가 자동으로 채워진다. 매니저는 이 값을 직접
            수정할 수 있고, {{addressFull}}, {{managementOfficePhone}},
            {{feeInquiryPhone}}, {{facilitySafetyPhone}}, {{buildingName}}
            토큰을 사용할 수 있다.
