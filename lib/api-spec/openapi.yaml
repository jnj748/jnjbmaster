openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 관리의달인 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task / To-Do management
  - name: inspections
    description: Legal inspection cycle management
  - name: taxSchedules
    description: Tax & accounting schedule management
  - name: reports
    description: Auto-generated reports
  - name: vendors
    description: Vendor recommendation & quotes
  - name: commissions
    description: Commission tracking
  - name: dashboard
    description: Dashboard summaries
  - name: tenants
    description: Tenant management
  - name: owners
    description: Owner management
  - name: vehicles
    description: Vehicle registration management
  - name: notifications
    description: In-app notifications
  - name: approvals
    description: Approval workflow management
  - name: safetyChecklists
    description: Safety checklist management for facility maintenance
  - name: maintenanceLogs
    description: Facility maintenance work logs
  - name: publicTenantCard
    description: Public tenant card form (no auth)
  - name: safetyTrainings
    description: Safety training management
  - name: taxDeadlineChecklists
    description: Tax deadline checklist management
  - name: attendance
    description: Attendance management
  - name: alertActions
    description: Alert action processing
  - name: units
    description: Unit management
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: meters
    description: Meter reading management (water, electricity, gas, heating, hot_water)
  - name: kepcoTransmissions
    description: 한전(전기) 검침값 송신 로그 (모의 송신)
  - name: fees
    description: Management fee calculation and billing
  - name: complaints
    description: Resident complaint management
  - name: voting
    description: Electronic voting management
  - name: delinquency
    description: Delinquency detection and enforcement
  - name: warranties
    description: Building warranty period management
  - name: contracts
    description: Partner contract lifecycle management
  - name: ai
    description: 관리소장 AI 도우미 (chat assistant)
  - name: documents
    description: "[Task #610] 통합 문서 레지스트리 — 모든 문서 산출물의 단일 인덱스"
  - name: noticeOutputs
    description: "[Task #610] 공고문 템플릿 export(PNG/DOCX/공유) 시점 등록"

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Tasks (To-Do) ──────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [high, medium, low]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a single task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Inspections (법정 점검) ─────────────────────────────────
  /inspections:
    get:
      operationId: listInspections
      tags: [inspections]
      summary: List all legal inspections
      responses:
        "200":
          description: Inspection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"
    post:
      operationId: createInspection
      tags: [inspections]
      summary: Create an inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInspectionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}:
    patch:
      operationId: updateInspection
      tags: [inspections]
      summary: Update an inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInspectionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"
    delete:
      operationId: deleteInspection
      tags: [inspections]
      summary: Delete an inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inspections/presets:
    get:
      operationId: listInspectionPresets
      tags: [inspections]
      summary: List legal inspection presets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionPreset"

  /inspections/bulk-register:
    post:
      operationId: bulkRegisterInspections
      tags: [inspections]
      summary: Bulk register inspections from presets by category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRegisterInspectionsBody"
      responses:
        "201":
          description: Bulk registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRegisterInspectionsResponse"

  /inspections/{id}/complete:
    post:
      operationId: completeInspection
      tags: [inspections]
      summary: Complete an inspection with result logging
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteInspectionBody"
      responses:
        "200":
          description: Inspection completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}/logs:
    get:
      operationId: listInspectionLogs
      tags: [inspections]
      summary: List inspection history logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionLog"

  /inspections/generate-alerts:
    post:
      operationId: generateInspectionAlerts
      tags: [inspections]
      summary: Generate advance alerts and auto-draft documents for upcoming inspections
      responses:
        "200":
          description: Generated alerts info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAlertsResponse"

  /inspections/upcoming:
    get:
      operationId: getUpcomingInspections
      tags: [inspections]
      summary: Get inspections due within 30 days
      responses:
        "200":
          description: Upcoming inspections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"

  /inspections/ai-matching:
    post:
      operationId: triggerAiMatching
      tags: [inspections]
      summary: Trigger AI matching - detect upcoming inspections, notify, recommend vendors, generate drafts
      responses:
        "200":
          description: AI matching results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMatchingResponse"

  /inspections/{id}/approve-matching:
    post:
      operationId: approveInspectionMatching
      tags: [inspections]
      summary: Approve AI matching - auto-generate RFQs for recommended vendors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMatchingBody"
      responses:
        "200":
          description: Matching approved and RFQs created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveMatchingResponse"

  # ── Tax Schedules (세무 일정) ───────────────────────────────
  /tax-schedules:
    get:
      operationId: listTaxSchedules
      tags: [taxSchedules]
      summary: List tax/accounting schedules
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxSchedule"
    post:
      operationId: createTaxSchedule
      tags: [taxSchedules]
      summary: Create a tax schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxScheduleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSchedule"

  /tax-schedules/{id}:
    patch:
      operationId: updateTaxSchedule
      tags: [taxSchedules]
      summary: Update a tax schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxScheduleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSchedule"
    delete:
      operationId: deleteTaxSchedule
      tags: [taxSchedules]
      summary: Delete a tax schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tax Deadline Checklists (세무 마감 체크리스트) ────────────────
  /tax-deadline-checklists:
    get:
      operationId: listTaxDeadlineChecklists
      tags: [taxDeadlineChecklists]
      summary: List tax deadline checklist items
      parameters:
        - name: taxScheduleId
          in: query
          schema:
            type: integer
        - name: dueDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDeadlineChecklist"
    post:
      operationId: createTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Create a tax deadline checklist item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxDeadlineChecklistBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDeadlineChecklist"

  /tax-deadline-checklists/{id}:
    patch:
      operationId: updateTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Update a tax deadline checklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxDeadlineChecklistBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDeadlineChecklist"
    delete:
      operationId: deleteTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Delete a tax deadline checklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tax-deadline-checklists/init/{taxScheduleId}:
    post:
      operationId: initTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Initialize default checklist items for a tax schedule
      parameters:
        - name: taxScheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Default checklist items created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDeadlineChecklist"

  # ── Attendance (출퇴근 관리) ────────────────────────────────────
  /attendance/check:
    post:
      operationId: checkAttendance
      tags: [attendance]
      summary: Check in or check out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckAttendanceBody"
      responses:
        "201":
          description: Attendance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance for the current user
      responses:
        "200":
          description: Today's attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/my:
    get:
      operationId: getMyAttendance
      tags: [attendance]
      summary: Get my attendance records
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monthly attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/stats:
    get:
      operationId: getAttendanceStats
      tags: [attendance]
      summary: Get attendance statistics for a user
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceStats"

  /attendance/all:
    get:
      operationId: getAllAttendance
      tags: [attendance]
      summary: Get all staff attendance (manager only)
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All staff attendance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffAttendanceSummary"

  # ── Vendors (업체 관리) ────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [contracted, platform]
      responses:
        "200":
          description: Vendor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vendors/recommend:
    get:
      operationId: getRecommendedVendors
      tags: [vendors]
      summary: Get recommended vendors for a category
      parameters:
        - name: category
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recommended vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/register:
    post:
      operationId: registerPlatformVendor
      tags: [vendors]
      summary: Register a new platform vendor (self sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlatformVendorBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/onboarding:
    post:
      operationId: onboardPartnerVendor
      tags: [vendors]
      summary: Partner onboarding wizard - create or update self vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorOnboardingBody"
      responses:
        "200":
          description: Onboarded vendor (wrapped)
          content:
            application/json:
              schema:
                type: object
                properties:
                  vendor:
                    $ref: "#/components/schemas/Vendor"
                required:
                  - vendor

  /me/vendor:
    get:
      operationId: getMyVendor
      tags: [vendors]
      summary: Get the vendor profile of the currently authenticated partner
      responses:
        "200":
          description: My vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: No vendor linked
    patch:
      operationId: updateMyVendor
      tags: [vendors]
      summary: Update the editable fields of the partner's own vendor
      description: |
        Locked fields (name, businessRegNumber, representativeName, category,
        subCategories) are stripped server-side and must be changed via
        /me/vendor/change-requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyVendorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /me/vendor/change-requests:
    post:
      operationId: createMyVendorChangeRequest
      tags: [vendors]
      summary: Submit a business-info change request for the partner's vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorChangeRequestBody"
      responses:
        "201":
          description: Created (wrapped)
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/VendorChangeRequest"
                required:
                  - request
        "409":
          description: A pending request already exists for this vendor

  /me/vendor/change-requests/active:
    get:
      operationId: getMyActiveVendorChangeRequest
      tags: [vendors]
      summary: Latest change request (any status) for the partner's vendor
      responses:
        "200":
          description: Active change request, or null if none
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    oneOf:
                      - $ref: "#/components/schemas/VendorChangeRequest"
                      - type: "null"

  /admin/vendor-change-requests:
    get:
      operationId: listVendorChangeRequests
      tags: [vendors]
      summary: HQ admin queue of vendor change requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
            default: pending
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/VendorChangeRequestRow"
                required:
                  - requests

  /admin/vendor-change-requests/{id}/approve:
    post:
      operationId: approveVendorChangeRequest
      tags: [vendors]
      summary: Approve a vendor change request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorChangeRequestDecisionBody"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/VendorChangeRequest"

  /admin/vendor-change-requests/{id}/reject:
    post:
      operationId: rejectVendorChangeRequest
      tags: [vendors]
      summary: Reject a vendor change request (reason required)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorChangeRequestDecisionBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/VendorChangeRequest"

  # ── Commissions (수수료) ───────────────────────────────────
  /commissions:
    get:
      operationId: listCommissions
      tags: [commissions]
      summary: List commission records
      responses:
        "200":
          description: Commission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commission"
    post:
      operationId: createCommission
      tags: [commissions]
      summary: Create a commission record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommissionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}:
    patch:
      operationId: updateCommission
      tags: [commissions]
      summary: Update commission status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
