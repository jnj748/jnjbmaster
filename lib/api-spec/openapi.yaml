    Rfq:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        # [Task #668] 응답 스키마는 strict enum 을 풀고 자유 string 으로 둔다.
        #   레거시 행(자유 입력 시절의 "방수/도장" 등)이 응답 한 줄을 깨뜨려
        #   GET /rfqs 가 통째로 500 이 되는 사고를 방지하기 위함.
        #   요청 스키마(CreateRfqBody / UpdateRfqBody)는 그대로 strict enum 을
        #   유지하므로 신규 데이터는 계속 정규 enum 만 들어온다.
        #   참고 enum: elevator, water_tank, fire_safety, electrical, gas,
        #             septic, cleaning, security, waterproofing,
        #             maintenance_repair, defect_diagnosis, building_maintenance,
        #             mechanical, other
        category:
          type: string
        # [Task #668] 동일 사유로 자유 string|null. 참고 enum: breakdown, defect,
        #   replacement, inspection, other.
        serviceType:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        buildingName:
          type: string
        desiredDate:
          type: ["string", "null"]
          format: date
        deadline:
          type: string
          format: date
        status:
          type: string
          enum: [open, closed, cancelled]
        vendorIds:
          type: ["string", "null"]
        sido:
          type: ["string", "null"]
        sigungu:
          type: ["string", "null"]
        geoScope:
          type: ["string", "null"]
        closeUpPhotoUrl:
          type: ["string", "null"]
        widePhotoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        expectedCreditCost:
          type: ["integer", "null"]
          description: "[Task #226] 파트너 시점 예상 차감 크레딧 (요청자가 파트너이거나 forVendorId가 명시된 경우에만 채워진다)."
        expectedCreditScope:
          type: ["string", "null"]
          enum: [sigungu, sido, default, null]
          description: "[Task #226] 단가 결정에 사용된 매칭 범위 (시군구 → 시도 → 기본 순)."
        noViewRefundDays:
          type: ["integer", "null"]
          description: "[Task #226] 미열람 환불 기준 일수 (운영 정책 스냅샷)."
        noViewRefundRatio:
          type: ["number", "null"]
          description: "[Task #226] 미열람 환불 비율 (0~1, 운영 정책 스냅샷)."
        requiresSiteVisit:
          type: boolean
          default: false
          description: "[Task #612] 현장방문 견적 필요 여부."
        closedAt:
          type: ["string", "null"]
          format: date-time
          description: "[Task #612] 견적 채택으로 RFQ 가 마감된 시각."
        closedQuoteId:
          type: ["integer", "null"]
          description: "[Task #612] 채택된 견적 ID."
      required:
        - id
        - title
        - category
        - buildingName
        - deadline
        - status
        - createdAt
        - updatedAt

