    post:
      operationId: previewBusinessRegOcr
      tags: [vendors]
      summary: OCR a business registration certificate (PDF/image) and return parsed fields without persisting
      description: |
        Task #745. Accepts an already-uploaded object path (object storage), runs OCR
        with Gemini 2.5 Flash, and returns vendorName / businessRegNumber / representative /
        address / businessType / businessItem / openedAt candidates with per-field
        confidence. The result is **not** stored — the caller reviews and saves via
        POST /vendors (+ POST /vendors/{id}/business-cert).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                objectPath:
                  type: string
                fileName:
                  type: ["string", "null"]
              required: [objectPath]
      responses:
        "200":
          description: Parsed business registration preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessRegOcrPreview"
        "400":
          description: Missing or invalid objectPath
        "403":
          description: No access to the uploaded object
        "404":
          description: Object not found
        "500":
          description: OCR failed

