components:
  schemas:
    # ── [Task #610] Documents (unified registry) ─────────────────────────────
    DocumentKind:
      type: string
      enum:
        - journal
        - weekly_report
        - monthly_report
        - draft
        - approval
        - quote_bundle
        - rfq
        - notice_output
        - alert_action_output
        - external
        - quote
        - contract
        - announcement
    DocumentState:
      type: string
      enum:
        - draft
        - active
        - submitted
        - completed
        - archived
        - rejected
    DocumentRow:
      type: object
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/DocumentKind"
        sourceTable:
          type: string
        sourceId:
          type: integer
        state:
          $ref: "#/components/schemas/DocumentState"
        title:
          type: ["string", "null"]
        subtitle:
          type: ["string", "null"]
        authorId:
          type: ["integer", "null"]
        authorRole:
          type: ["string", "null"]
        buildingId:
          type: ["integer", "null"]
        periodStart:
          type: ["string", "null"]
        periodEnd:
          type: ["string", "null"]
        href:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, kind, sourceTable, sourceId, state, metadata, createdAt, updatedAt]
    DocumentsPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentRow"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    NoticeOutputFormat:
      type: string
      enum: [png, docx, pdf, share]
    NoticeOutput:
      type: object
      properties:
        id:
          type: integer
        templateId:
          type: integer
        buildingId:
          type: integer
        authorId:
          type: integer
        authorRole:
          type: string
        title:
          type: string
        formats:
          type: array
          items:
            $ref: "#/components/schemas/NoticeOutputFormat"
        outputDate:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, templateId, buildingId, authorId, authorRole, title, formats, outputDate, createdAt, updatedAt]
    RegisterNoticeOutputBody:
      type: object
      properties:
        templateId:
          type: integer
        title:
          type: string
        format:
          $ref: "#/components/schemas/NoticeOutputFormat"
        outputDate:
          type: string
      required: [templateId, title, format]

    AiChatCitation:
      type: object
      properties:
        type:
          type: string
        id:
          oneOf:
            - type: integer
            - type: string
        label:
          type: string
      required:
        - type
        - id
        - label
    AiChatSession:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        buildingId:
          type: ["integer", "null"]
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, title, createdAt, updatedAt]
    AiChatMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/AiChatCitation"
        createdAt:
          type: string
          format: date-time
      required: [id, sessionId, role, content, createdAt]
    CreateAiSessionBody:
      type: object
      properties:
        title:
          type: string
    RenameAiSessionBody:
      type: object
      properties:
        title:
          type: string
      required: [title]
    SendAiChatMessageBody:
      type: object
      properties:
        sessionId:
          type: integer
        content:
          type: string
      required: [content]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [daily_check, maintenance, administrative, tax, other]
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [pending, in_progress, completed]
        dueDate:
          type: ["string", "null"]
          format: date
        completedAt:
          type: ["string", "null"]
          format: date-time
        # [Task #697] 역할별 노출 제어. 빈 배열은 "기본 라우팅"(category 기반)과 동일하게 동작.
        targetRoles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - category
        - priority
        - status
        - targetRoles
        - createdAt
        - updatedAt

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [daily_check, maintenance, administrative, tax, other]
        priority:
          type: string
          enum: [high, medium, low]
        dueDate:
          type: ["string", "null"]
          format: date
        # [Task #697] 생략 시 서버가 카테고리에서 기본 역할을 채워 저장한다.
        targetRoles:
          type: ["array", "null"]
          items:
            type: string
      required:
        - title
        - category
        - priority

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [daily_check, maintenance, administrative, tax, other]
