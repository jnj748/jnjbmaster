        모든 변경은 meter_reading_audits 에 영구 보관된다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeterReadingBody"
      responses:
        "200":
