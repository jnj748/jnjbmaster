          type: string
        exclusiveArea:
          type: ["string", "null"]
        commonArea:
          type: ["string", "null"]
        usage:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [vacant, occupied, maintenance]
        # [Task #348] 호실 데이터 출처. 'register' = 건축물대장 자동 가져오기,
        # 'csv' = CSV 업로드, 'manual' = 수기 입력. 호실 관리/입주민/회계에서
        # 출처 뱃지로 노출하는 단일 소스.
        source:
          type: string
          enum: [register, manual, csv]
        # [Task #348] 마지막으로 건축물대장에서 동기화된 시각.
        lastRegisterSyncedAt:
          type: ["string", "null"]
          format: date-time
        # [Task #348] 동기화에 사용한 관리건축물대장PK.
        mgmBldrgstPk:
          type: ["string", "null"]
        # [Task #516] 소유자 이름/연락처/주소. ownerSource 가 채워진 컬럼의 출처를 알린다.
        ownerName:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        ownerAddress:
          type: ["string", "null"]
        # 'auto' = 부동산공부조회 등 외부 API, 'manual' = 사용자 수기 입력, 'csv' = CSV 업로드.
        ownerSource:
          type: ["string", "null"]
          enum: [auto, manual, csv, null]
        tenantCount:
          type: integer
        ownerCount:
          type: integer
        vehicleCount:
          type: integer
        # [Task #796] XpBIZ 호실관리 그리드용 7개 신규 컬럼.
        unitUsage:
          type: ["string", "null"]
        residenceUsage:
          type: ["string", "null"]
        ownershipType:
          type: ["string", "null"]
        keySentAt:
          type: ["string", "null"]
          format: date
        vendorName:
          type: ["string", "null"]
        representativeName:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        businessNumber:
          type: ["string", "null"]
        entryDate:
          type: ["string", "null"]
          format: date
        supplyArea:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # [Task #348] 호실 일괄 가져오기 미리보기 행. 신규/갱신/유지(스킵) 분류와
    # 함께 화면에 미리보기 표를 그릴 때 사용한다.
    ImportUnitPreviewItem:
      type: object
      required: [dong, floor, unitNumber, exclusiveArea, commonArea, usage, action]
      properties:
        # [Task #516] 동(棟). 단일 동 건물은 빈 문자열, 다동 건물은 동 이름.
        dong:
          type: string
        floor:
          type: string
        unitNumber:
          type: string
        exclusiveArea:
          type: number
        commonArea:
          type: number
        usage:
          type: ["string", "null"]
        # [Task #516] best-effort 소유자 자동 조회로 채워진 값(있으면 미리보기에 노출).
        ownerName:
          type: ["string", "null"]
        ownerAddress:
          type: ["string", "null"]
        # 'create' = 신규 등록 예정/실시
        # 'update' = 면적/용도 갱신 예정/실시 (사용자 수기 컬럼은 보존)
        # 'skip'   = 면적/용도 변화가 없어 그대로 유지
        action:
          type: string
          enum: [create, update, skip]

    ImportUnitsFromRegisterResponse:
      type: object
      required: [dryRun, created, updated, skipped, items]
      properties:
        dryRun:
          type: boolean
        # [Task #698] dryRun=true 응답에만 채워지는 미리보기 토큰. 클라이언트는 이 토큰을
        # 그대로 확정 단계 요청 본문 previewToken 으로 보내 외부 API 재호출 없이 적용한다.
        previewToken:
          type: string
        created:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        # dryRun=true: DB 변경 없이 산정된 미리보기.
        # dryRun=false: 실제 적용된 결과를 동일한 형태로 반환.
        items:
          type: array
          items:
            $ref: "#/components/schemas/ImportUnitPreviewItem"
        # 마지막 동기화 시각. dryRun=true 면 null.
        lastSyncedAt:
          type: ["string", "null"]
          format: date-time
        # [Task #516] 소유자 자동 조회 시도 여부와 적중 수.
        # enabled=false 면 외부 키가 없어 호출 자체를 건너뛴 상태.
        ownerLookupEnabled:
          type: boolean
        ownerLookupAttempted:
          type: integer
        ownerLookupHit:
          type: integer
        # [Task #689] 건축물대장에 호실 단위 자료가 없을 때(=일반건축물 또는 비어 있는 응답)
        # API 오류와 구분해 안내 메시지를 함께 200 으로 돌려준다. items 가 비어 있을 때만
        # 채워지며, 클라이언트는 이 필드가 있으면 빈 표 대신 안내 카드를 보여 준다.
        noUnitData:
          type: object
          required: [kind, message]
          properties:
            # 'general' = regstrGbCdNm == "일반" (=다가구·단독). 전유부 자료 자체가 공공 API
            #   에 없는 케이스. 'empty' = 응답은 있었지만 호실 단위 행이 0건.
            kind:
              type: string
              enum: [general, empty]
            message:
              type: string
            # 'land-code' = 토지 식별자 1회 호출, 'pk-fallback' = 동(棟) PK 순회 폴백,
            # 'none' = 식별자/PK 모두 없어 호출 자체를 못 한 케이스. 운영 로그/지원 진단용.
            source:
              type: string
              enum: [land-code, pk-fallback, none]

    # [Task #516] 소유자 자동 조회 결과 한 행. 외부 API 가 비어있는 필드는 생략된다.
    OwnerLookupRow:
      type: object
      required: [dong, unitNumber]
      properties:
        dong:
          type: string
        unitNumber:
          type: string
        ownerName:
          type: string
        ownerAddress:
          type: string

    OwnerLookupResponse:
      type: object
      required: [enabled, rows]
      properties:
