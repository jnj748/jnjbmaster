  # ── [Task #348] 건축물대장 기반 호실 일괄 가져오기 ─────────────────────
  /buildings/units/import-from-register:
    post:
      operationId: importUnitsFromRegister
      tags: [buildings]
      summary: 건축물대장(전유부/공용부) 면적 정보로 호실을 일괄 upsert
      description: |
        현재 사용자의 건물에 연결된 mgmBldrgstPk 로 건축물대장 전유부/공용부
        면적 정보를 조회해 호실(units)을 idempotent 하게 upsert 한다.
        매칭 키는 (층 + 호실번호); 동일 행이 있으면 면적/용도/source/마지막
        동기화 시각만 갱신하고, 사용자 수기 입력(소유자/입주민/연락처/메모 등)은
        절대 덮어쓰지 않는다. dryRun=true 면 DB 변경 없이 미리보기만 반환한다.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dryRun:
                  type: boolean
                  default: false
                # [Task #516] best-effort 소유자 자동 조회를 시도할지 여부.
                # 기본 true. 외부 API 키가 없거나 실패해도 호실 가져오기 자체는 진행한다.
                includeOwners:
                  type: boolean
                  default: true
                # [Task #698] 미리보기 단계에서 받은 토큰. dryRun=false 와 함께 보내면
                # 외부 건축물대장 API 를 다시 호출하지 않고 캐시된 분류 결과를 그대로
                # DB 에 반영한다. 토큰이 만료/없음이면 410 PREVIEW_EXPIRED 로 응답한다.
                previewToken:
                  type: string
      responses:
        "200":
          description: 가져오기 결과 (실제 또는 미리보기)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUnitsFromRegisterResponse"
        "400":
          description: 건물에 등록된 mgmBldrgstPk 가 없습니다.
        "404":
          description: 건축물대장에서 면적 정보를 찾을 수 없습니다.
        # [Task #698] 미리보기 토큰이 만료되었거나 일치하지 않을 때.
        # 클라이언트는 자동으로 미리보기를 한 번 더 받아 같은 토큰으로 재시도한다.
        "410":
          description: 미리보기 결과가 만료되었습니다 (PREVIEW_EXPIRED).
        # [Task #698] 외부 건축물대장 API 가 일시 장애일 때. 프록시 단의 502 와 구분해
        # 사용자에게 한국어 안내 메시지 + 재시도 동선을 제공할 수 있도록 한다.
        "503":
          description: 건축물대장 조회 일시 실패 (REGISTER_FETCH_FAILED).

  # [Task #516] best-effort 소유자 자동 조회 — 키 없으면 빈 결과를 돌려준다.
  /buildings/owner-lookup:
    post:
