        matchSource:
          type: string
          enum: [auto, manual]

    Unit:
      type: object
      required: [id, buildingId, dong, unitNumber, floor, status, source, createdAt, updatedAt]
      properties:
        id:
          type: integer
        buildingId:
          type: integer
        # [Task #516] 집합건축물(아파트·오피스텔)에서 동(棟). 단일 동 건물은 빈 문자열.
