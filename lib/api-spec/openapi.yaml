        intervalDays:
          type: ["integer", "null"]
        fixedDay:
          type: ["integer", "null"]
        recommendedMonths:
          type: ["string", "null"]
        lastInspectionDate:
          type: ["string", "null"]
          format: date
        nextDueDate:
          type: string
          format: date
        notes:
          type: ["string", "null"]
        legalBasis:
          type: ["string", "null"]
        advanceAlertDays:
          type: integer
      required:
        - name
        - category
        - frequencyPerYear
        - nextDueDate

    UpdateInspectionBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum: [elevator, water_tank, fire_safety, electrical, gas, septic, playground, safety_check, hygiene, building_safety, administrative, other]
        inspectionType:
          type: string
          enum: [legal, self_regular, biweekly, seasonal, administrative]
        frequencyPerYear:
          type: integer
