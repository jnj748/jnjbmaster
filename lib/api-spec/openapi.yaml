openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 관리의달인 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task / To-Do management
  - name: inspections
    description: Legal inspection cycle management
  - name: taxSchedules
    description: Tax & accounting schedule management
  - name: reports
    description: Auto-generated reports
  - name: vendors
    description: Vendor recommendation & quotes
  - name: commissions
    description: Commission tracking
  - name: dashboard
    description: Dashboard summaries
  - name: tenants
    description: Tenant management
  - name: owners
    description: Owner management
  - name: vehicles
    description: Vehicle registration management
  - name: notifications
    description: In-app notifications
  - name: approvals
    description: Approval workflow management
  - name: safetyChecklists
    description: Safety checklist management for facility maintenance
  - name: maintenanceLogs
    description: Facility maintenance work logs
  - name: safetyTrainings
    description: Safety training management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Tasks (To-Do) ──────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [high, medium, low]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a single task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Inspections (법정 점검) ─────────────────────────────────
  /inspections:
    get:
      operationId: listInspections
      tags: [inspections]
      summary: List all legal inspections
      responses:
        "200":
          description: Inspection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"
    post:
      operationId: createInspection
      tags: [inspections]
      summary: Create an inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInspectionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}:
    patch:
      operationId: updateInspection
      tags: [inspections]
      summary: Update an inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInspectionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"
    delete:
      operationId: deleteInspection
      tags: [inspections]
      summary: Delete an inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inspections/presets:
    get:
      operationId: listInspectionPresets
      tags: [inspections]
      summary: List legal inspection presets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionPreset"

  /inspections/{id}/complete:
    post:
      operationId: completeInspection
      tags: [inspections]
      summary: Complete an inspection with result logging
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteInspectionBody"
      responses:
        "200":
          description: Inspection completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}/logs:
    get:
      operationId: listInspectionLogs
      tags: [inspections]
      summary: List inspection history logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionLog"

  /inspections/generate-alerts:
    post:
      operationId: generateInspectionAlerts
      tags: [inspections]
      summary: Generate advance alerts and auto-draft documents for upcoming inspections
      responses:
        "200":
          description: Generated alerts info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAlertsResponse"

  /inspections/upcoming:
    get:
      operationId: getUpcomingInspections
      tags: [inspections]
      summary: Get inspections due within 30 days
      responses:
        "200":
          description: Upcoming inspections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"

  /inspections/ai-matching:
    post:
      operationId: triggerAiMatching
      tags: [inspections]
      summary: Trigger AI matching - detect upcoming inspections, notify, recommend vendors, generate drafts
      responses:
        "200":
          description: AI matching results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMatchingResponse"

  /inspections/{id}/approve-matching:
    post:
      operationId: approveInspectionMatching
      tags: [inspections]
      summary: Approve AI matching - auto-generate RFQs for recommended vendors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMatchingBody"
      responses:
        "200":
          description: Matching approved and RFQs created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveMatchingResponse"

  # ── Tax Schedules (세무 일정) ───────────────────────────────
  /tax-schedules:
    get:
      operationId: listTaxSchedules
      tags: [taxSchedules]
      summary: List tax/accounting schedules
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxSchedule"
    post:
      operationId: createTaxSchedule
      tags: [taxSchedules]
      summary: Create a tax schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxScheduleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSchedule"

  /tax-schedules/{id}:
    patch:
      operationId: updateTaxSchedule
      tags: [taxSchedules]
      summary: Update a tax schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxScheduleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSchedule"
    delete:
      operationId: deleteTaxSchedule
      tags: [taxSchedules]
      summary: Delete a tax schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Vendors (업체 관리) ────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [contracted, platform]
      responses:
        "200":
          description: Vendor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vendors/recommend:
    get:
      operationId: getRecommendedVendors
      tags: [vendors]
      summary: Get recommended vendors for a category
      parameters:
        - name: category
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recommended vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/register:
    post:
      operationId: registerPlatformVendor
      tags: [vendors]
      summary: Register a new platform vendor (self sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlatformVendorBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  # ── Commissions (수수료) ───────────────────────────────────
  /commissions:
    get:
      operationId: listCommissions
      tags: [commissions]
      summary: List commission records
      responses:
        "200":
          description: Commission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commission"
    post:
      operationId: createCommission
      tags: [commissions]
      summary: Create a commission record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommissionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}:
    patch:
      operationId: updateCommission
      tags: [commissions]
      summary: Update commission status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommissionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/auto-settle:
    post:
      operationId: autoSettleCommission
      tags: [commissions]
      summary: Auto-create commission record when contract completes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoSettleCommissionBody"
      responses:
        "201":
          description: Commission auto-settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoSettleCommissionResponse"

  # ── RFQs (견적요청) ──────────────────────────────────────
  /rfqs:
    get:
      operationId: listRfqs
      tags: [vendors]
      summary: List RFQs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, cancelled]
        - name: vendorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: RFQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rfq"
    post:
      operationId: createRfq
      tags: [vendors]
      summary: Create an RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRfqBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"

  /rfqs/{id}:
    get:
      operationId: getRfq
      tags: [vendors]
      summary: Get a single RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFQ detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"
        "404":
          description: Not found
    patch:
      operationId: updateRfq
      tags: [vendors]
      summary: Update an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRfqBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"
        "404":
          description: Not found
    delete:
      operationId: deleteRfq
      tags: [vendors]
      summary: Delete an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Quotes (견적서) ─────────────────────────────────────
  /quotes:
    get:
      operationId: listQuotes
      tags: [vendors]
      summary: List quotes
      parameters:
        - name: rfqId
          in: query
          schema:
            type: integer
        - name: vendorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [submitted, accepted, rejected]
      responses:
        "200":
          description: Quote list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [vendors]
      summary: Submit a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [vendors]
      summary: Get a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Not found
    patch:
      operationId: updateQuote
      tags: [vendors]
      summary: Update a quote status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Not found

  # ── Work Reports (작업완료보고) ──────────────────────────
  /work-reports:
    get:
      operationId: listWorkReports
      tags: [vendors]
      summary: List work reports
      parameters:
        - name: vendorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [submitted, approved, rejected]
      responses:
        "200":
          description: Work report list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkReport"
    post:
      operationId: createWorkReport
      tags: [vendors]
      summary: Submit a work report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkReportBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkReport"

  /work-reports/{id}:
    get:
      operationId: getWorkReport
      tags: [vendors]
      summary: Get a work report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Work report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkReport"
        "404":
          description: Not found
    patch:
      operationId: updateWorkReport
      tags: [vendors]
      summary: Review a work report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkReportBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkReport"
        "404":
          description: Not found

  # ── Settlements (정산) ──────────────────────────────────
  /settlements:
    get:
      operationId: listSettlements
      tags: [vendors]
      summary: List settlements
      parameters:
        - name: vendorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, paid, cancelled]
      responses:
        "200":
          description: Settlement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Settlement"
    post:
      operationId: createSettlement
      tags: [vendors]
      summary: Create a settlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSettlementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settlement"

  /settlements/{id}:
    patch:
      operationId: updateSettlement
      tags: [vendors]
      summary: Update settlement status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettlementBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settlement"
        "404":
          description: Not found

  # ── Drafts (기안서) ───────────────────────────────────────
  /drafts:
    get:
      operationId: listDrafts
      tags: [inspections]
      summary: List all draft documents
      responses:
        "200":
          description: Draft list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Draft"

  /drafts/{id}:
    get:
      operationId: getDraft
      tags: [inspections]
      summary: Get a single draft document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draft detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "404":
          description: Not found
    patch:
      operationId: updateDraft
      tags: [inspections]
      summary: Update a draft document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "404":
          description: Not found

  # ── Reports (보고서) ───────────────────────────────────────
  /reports/weekly:
    get:
      operationId: getWeeklyReport
      tags: [reports]
      summary: Get auto-generated weekly report
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Weekly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReport"

  # ── Dashboard (대시보드) ───────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview
      responses:
        "200":
          description: Summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Get active alerts and notifications
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  # ── Approvals (결재) ──────────────────────────────────────
  /approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      summary: List approval requests
      parameters:
        - name: status
          in: query
          schema:
