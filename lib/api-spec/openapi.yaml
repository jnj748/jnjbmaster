        status:
          type: string
          enum: [upcoming, overdue, completed, scheduled]
        notes:
          type: ["string", "null"]
        legalBasis:
          type: ["string", "null"]
        advanceAlertDays:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - inspectionType
        - frequencyPerYear
        - nextDueDate
        - status
        - advanceAlertDays
        - createdAt
        - updatedAt

    CreateInspectionBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum: [elevator, water_tank, fire_safety, electrical, gas, septic, playground, safety_check, hygiene, building_safety, administrative, other]
        inspectionType:
          type: string
          enum: [legal, self_regular, biweekly, seasonal, administrative]
        frequencyPerYear:
