openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 관리의달인 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task / To-Do management
  - name: inspections
    description: Legal inspection cycle management
  - name: taxSchedules
    description: Tax & accounting schedule management
  - name: reports
    description: Auto-generated reports
  - name: vendors
    description: Vendor recommendation & quotes
  - name: commissions
    description: Commission tracking
  - name: dashboard
    description: Dashboard summaries
  - name: tenants
    description: Tenant management
  - name: owners
    description: Owner management
  - name: vehicles
    description: Vehicle registration management
  - name: notifications
    description: In-app notifications
  - name: approvals
    description: Approval workflow management
  - name: safetyChecklists
    description: Safety checklist management for facility maintenance
  - name: maintenanceLogs
    description: Facility maintenance work logs
  - name: publicTenantCard
    description: Public tenant card form (no auth)
  - name: safetyTrainings
    description: Safety training management
  - name: taxDeadlineChecklists
    description: Tax deadline checklist management
  - name: attendance
    description: Attendance management
  - name: alertActions
    description: Alert action processing
  - name: units
    description: Unit management
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: meters
    description: Meter reading management (water, electricity, gas, heating)
  - name: fees
    description: Management fee calculation and billing
  - name: complaints
    description: Resident complaint management
  - name: voting
    description: Electronic voting management
  - name: delinquency
    description: Delinquency detection and enforcement

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Tasks (To-Do) ──────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [high, medium, low]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a single task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Inspections (법정 점검) ─────────────────────────────────
  /inspections:
    get:
      operationId: listInspections
      tags: [inspections]
      summary: List all legal inspections
      responses:
        "200":
          description: Inspection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"
    post:
      operationId: createInspection
      tags: [inspections]
      summary: Create an inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInspectionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}:
    patch:
      operationId: updateInspection
      tags: [inspections]
      summary: Update an inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInspectionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"
    delete:
      operationId: deleteInspection
      tags: [inspections]
      summary: Delete an inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inspections/presets:
    get:
      operationId: listInspectionPresets
      tags: [inspections]
      summary: List legal inspection presets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionPreset"

  /inspections/bulk-register:
    post:
      operationId: bulkRegisterInspections
      tags: [inspections]
      summary: Bulk register inspections from presets by category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRegisterInspectionsBody"
      responses:
        "201":
          description: Bulk registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRegisterInspectionsResponse"

  /inspections/{id}/complete:
    post:
      operationId: completeInspection
      tags: [inspections]
      summary: Complete an inspection with result logging
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteInspectionBody"
      responses:
        "200":
          description: Inspection completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}/logs:
    get:
      operationId: listInspectionLogs
      tags: [inspections]
      summary: List inspection history logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionLog"

  /inspections/generate-alerts:
    post:
      operationId: generateInspectionAlerts
      tags: [inspections]
      summary: Generate advance alerts and auto-draft documents for upcoming inspections
      responses:
        "200":
          description: Generated alerts info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAlertsResponse"

  /inspections/upcoming:
    get:
      operationId: getUpcomingInspections
      tags: [inspections]
      summary: Get inspections due within 30 days
      responses:
        "200":
          description: Upcoming inspections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inspection"

  /inspections/ai-matching:
    post:
      operationId: triggerAiMatching
      tags: [inspections]
      summary: Trigger AI matching - detect upcoming inspections, notify, recommend vendors, generate drafts
      responses:
        "200":
          description: AI matching results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiMatchingResponse"

  /inspections/{id}/approve-matching:
    post:
      operationId: approveInspectionMatching
      tags: [inspections]
      summary: Approve AI matching - auto-generate RFQs for recommended vendors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMatchingBody"
      responses:
        "200":
          description: Matching approved and RFQs created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveMatchingResponse"

  # ── Tax Schedules (세무 일정) ───────────────────────────────
  /tax-schedules:
    get:
      operationId: listTaxSchedules
      tags: [taxSchedules]
      summary: List tax/accounting schedules
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxSchedule"
    post:
      operationId: createTaxSchedule
      tags: [taxSchedules]
      summary: Create a tax schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxScheduleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSchedule"

  /tax-schedules/{id}:
    patch:
      operationId: updateTaxSchedule
      tags: [taxSchedules]
      summary: Update a tax schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxScheduleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxSchedule"
    delete:
      operationId: deleteTaxSchedule
      tags: [taxSchedules]
      summary: Delete a tax schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tax Deadline Checklists (세무 마감 체크리스트) ────────────────
  /tax-deadline-checklists:
    get:
      operationId: listTaxDeadlineChecklists
      tags: [taxDeadlineChecklists]
      summary: List tax deadline checklist items
      parameters:
        - name: taxScheduleId
          in: query
          schema:
            type: integer
        - name: dueDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDeadlineChecklist"
    post:
      operationId: createTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Create a tax deadline checklist item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxDeadlineChecklistBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDeadlineChecklist"

  /tax-deadline-checklists/{id}:
    patch:
      operationId: updateTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Update a tax deadline checklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxDeadlineChecklistBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDeadlineChecklist"
    delete:
      operationId: deleteTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Delete a tax deadline checklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tax-deadline-checklists/init/{taxScheduleId}:
    post:
      operationId: initTaxDeadlineChecklist
      tags: [taxDeadlineChecklists]
      summary: Initialize default checklist items for a tax schedule
      parameters:
        - name: taxScheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Default checklist items created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDeadlineChecklist"

  # ── Attendance (출퇴근 관리) ────────────────────────────────────
  /attendance/check:
    post:
      operationId: checkAttendance
      tags: [attendance]
      summary: Check in or check out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckAttendanceBody"
      responses:
        "201":
          description: Attendance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance for the current user
      responses:
        "200":
          description: Today's attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/my:
    get:
      operationId: getMyAttendance
      tags: [attendance]
      summary: Get my attendance records
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monthly attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/stats:
    get:
      operationId: getAttendanceStats
      tags: [attendance]
      summary: Get attendance statistics for a user
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceStats"

  /attendance/all:
    get:
      operationId: getAllAttendance
      tags: [attendance]
      summary: Get all staff attendance (manager only)
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All staff attendance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffAttendanceSummary"

  # ── Vendors (업체 관리) ────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [contracted, platform]
      responses:
        "200":
          description: Vendor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vendors/recommend:
    get:
      operationId: getRecommendedVendors
      tags: [vendors]
      summary: Get recommended vendors for a category
      parameters:
        - name: category
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recommended vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/register:
    post:
      operationId: registerPlatformVendor
      tags: [vendors]
      summary: Register a new platform vendor (self sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlatformVendorBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  # ── Commissions (수수료) ───────────────────────────────────
  /commissions:
    get:
      operationId: listCommissions
      tags: [commissions]
      summary: List commission records
      responses:
        "200":
          description: Commission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commission"
    post:
      operationId: createCommission
      tags: [commissions]
      summary: Create a commission record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommissionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}:
    patch:
      operationId: updateCommission
      tags: [commissions]
      summary: Update commission status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommissionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/auto-settle:
    post:
      operationId: autoSettleCommission
      tags: [commissions]
      summary: Auto-create commission record when contract completes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoSettleCommissionBody"
      responses:
        "201":
          description: Commission auto-settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoSettleCommissionResponse"

  # ── RFQs (견적요청) ──────────────────────────────────────
  /rfqs:
    get:
      operationId: listRfqs
      tags: [vendors]
      summary: List RFQs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, cancelled]
        - name: vendorId
          in: query
          schema:
            type: integer
        - name: forVendorId
          in: query
          description: Filter RFQs visible to this vendor (by invitation + geo/category match)
          schema:
            type: integer
      responses:
        "200":
          description: RFQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rfq"
    post:
      operationId: createRfq
      tags: [vendors]
      summary: Create an RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRfqBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"

  /rfqs/{id}:
    get:
      operationId: getRfq
      tags: [vendors]
      summary: Get a single RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFQ detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"
        "404":
          description: Not found
    patch:
      operationId: updateRfq
      tags: [vendors]
      summary: Update an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRfqBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"
        "404":
          description: Not found
    delete:
      operationId: deleteRfq
      tags: [vendors]
      summary: Delete an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /rfqs/{id}/expand-scope:
    patch:
      operationId: expandRfqScope
      tags: [vendors]
      summary: Expand RFQ geo scope from sigungu to sido
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expanded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfq"
        "404":
          description: Not found

  /rfqs/{id}/matched-vendors:
    get:
      operationId: getRfqMatchedVendors
      tags: [vendors]
      summary: Get geo-matched vendors for an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Matched vendor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  # ── Alert Actions (알림 처리) ─────────────────────────
  /alert-actions:
    get:
      operationId: listAlertActions
      tags: [alertActions]
      summary: List alert actions
      parameters:
        - name: alertType
          in: query
          schema:
            type: string
        - name: relatedEntityId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Alert action list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertAction"
    post:
      operationId: createAlertAction
      tags: [alertActions]
      summary: Create an alert action (complete, postpone, or request quote)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertActionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertAction"

  # ── Storage (파일 업로드) ─────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.
  /storage/uploads/finalize:
    post:
      tags: [Storage]
      operationId: finalizeUpload
      summary: Finalize upload by setting ACL policy on uploaded object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [objectPath]
              properties:
                objectPath:
                  type: string
      responses:
        '200':
          description: ACL policy set successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Missing objectPath.
        '500':
          description: Failed to finalize upload.
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
