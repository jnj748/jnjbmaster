<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4f4cdc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="관리의달인" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>관리의달인</title>
    <script>
      // [도메인 일원화] jnjbuildingmaster.replit.app 으로 들어온 모든 트래픽을
      //   정식 도메인 jnjbmaster.com 으로 즉시 이동시킨다. React 마운트 전에
      //   실행되어 사용자에게는 jnjbmaster.com 만 보인다.
      (function () {
        if (location.hostname === "jnjbuildingmaster.replit.app") {
          location.replace(
            "https://jnjbmaster.com" + location.pathname + location.search + location.hash
          );
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon-v2.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192-v2.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512-v2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
